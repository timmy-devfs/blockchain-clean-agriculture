# ════════════════════════════════════════════════════════════════
# BICAP — Guest Service (port 8089)
# Public APIs — không cần JWT
# ════════════════════════════════════════════════════════════════

server.port=8089

spring.application.name=guest-service

# ── MySQL ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/guest_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=bicap_user
spring.datasource.password=12123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=GuestHikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ── JPA ───────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ── Redis ─────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ── Upstream Services ─────────────────────────────────────────
services.farm.url=http://localhost:8082
services.blockchain.url=http://localhost:8090

# ── Cache TTL ─────────────────────────────────────────────────
cache.public-products-ttl-seconds=600

# ── Actuator ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────
logging.level.com.bicap.guest=DEBUG