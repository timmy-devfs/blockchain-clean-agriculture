spring.application.name=notification-service
server.port=8085

# MySQL
spring.datasource.url=jdbc:mysql://mysql:3306/notification_db
spring.datasource.username=root
spring.datasource.password=123123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

# Kafka consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:notification-service}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Firebase
app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:/app/resources/service-account.json}
app.firebase.enabled=true

# Topics
app.kafka.topics.order-placed=${KAFKA_TOPIC_ORDER_PLACED:bicap.order.placed}
app.kafka.topics.order-confirmed=${KAFKA_TOPIC_ORDER_CONFIRMED:bicap.order.confirmed}
app.kafka.topics.shipment-updated=${KAFKA_TOPIC_SHIPMENT_UPDATED:bicap.shipment.updated}
app.kafka.topics.iot-alert=${KAFKA_TOPIC_IOT_ALERT:bicap.iot.alert}
app.kafka.topics.payment-success=${KAFKA_TOPIC_PAYMENT_SUCCESS:bicap.payment.success}
app.kafka.topics.order-delivered=${KAFKA_TOPIC_ORDER_DELIVERED:bicap.order.delivered}
