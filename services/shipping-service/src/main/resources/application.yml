server:
  port: 8084  # Cổng chạy service này

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/shipping_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 12123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQL8Dialect  # Flyway tự chạy các file V1__..sql → V5__..sql khi khởi động
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: shipping-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

shipping:
  kafka:
    topic:
      shipment-updated: bicap.shipment.updated

# Cho phép gọi /actuator/health để kiểm tra service
management:
  endpoints:
    web:
      exposure:
        include: health
