<!DOCTYPE html>
<html>
<head>
    <title>Get FCM Token</title>
</head>
<body>
    <h2>FCM Token của bạn:</h2>
    <textarea id="token-box" rows="5" cols="50" readonly>Đang lấy token...</textarea>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

        // Config lấy từ ảnh image_38157d.png của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyAddWgmwXUnewvcyra4CWlv_u7XfHEPovc",
            authDomain: "bicap-b4230.firebaseapp.com",
            projectId: "bicap-b4230",
            storageBucket: "bicap-b4230.firebasestorage.app",
            messagingSenderId: "307650253482",
            appId: "1:307650253482:web:7a836504b6b8c5b206f6d3"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // Lấy token (VAPID Key lấy trong Project Settings -> Cloud Messaging)
        getToken(messaging, { vapidKey: 'BJKgkdifZzPv83HNyLHB-pyzFiiVawKXEkN3Yk15zJv-7Ms3ot9A_dcbIfD4cT9vpe7vU2vMS2msoPoW9FRlOa8' })
            .then((currentToken) => {
                if (currentToken) {
                    document.getElementById('token-box').value = currentToken;
                    console.log("Token thật:", currentToken);
                } else {
                    alert('Bạn cần cho phép quyền thông báo!');
                }
            }).catch((err) => {
                console.log('Lỗi lấy token: ', err);
            });
    </script>
</body>
</html>
