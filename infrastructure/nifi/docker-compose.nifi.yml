version: "3.9"

networks:
  bicap-network:
    name: bicap-network
    external: true

volumes:
  nifi-data:
  nifi-logs:

services:
  nifi:
    image: apache/nifi:1.23.0
    container_name: bicap-nifi
    restart: unless-stopped
    networks:
      - bicap-network
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminadminadmin
      NIFI_WEB_HTTPS_PORT: 8443
    volumes:
      - nifi-data:/opt/nifi/nifi-current/conf
      - nifi-logs:/opt/nifi/nifi-current/logs
      - ./flows:/opt/nifi/nifi-current/flow-templates
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8443/nifi"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s