  /notifications/unread-count:
    get:
      tags:
        - Notifications
      summary: ?????m s??? th??ng b??o ch??a ?????c
      operationId: getUnreadCount
      parameters:
        - name: X-User-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Tr??? v??? s??? l?????ng unread
          content:
            '*/*':
              schema:
                type: integer
                format: int64
        "400":
          description: Thi???u ?????nh danh user
          content:
            '*/*':
