# ════════════════════════════════════════════════════════════════
# BICAP Nginx — Development (no SSL)
# Port 80 → reverse proxy đến 5 web apps + api-gateway
# ════════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    # ── Upstream definitions ─────────────────────────────────
    upstream api_gateway {
        server host.docker.internal:8080;
    }
    upstream web_admin {
        server host.docker.internal:3000;
    }
    upstream web_farm {
        server host.docker.internal:3001;
    }
    upstream web_retailer {
        server host.docker.internal:3002;
    }
    upstream web_shipping {
        server host.docker.internal:3003;
    }
    upstream web_public {
        server host.docker.internal:3004;
    }

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── API Gateway ──────────────────────────────────────────
    server {
        listen 80;
        server_name api.bicap.local;

        location / {
            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
    }

    # ── Web Admin ────────────────────────────────────────────
    server {
        listen 80;
        server_name admin.bicap.local;
        location / {
            proxy_pass http://web_admin;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Web Farm ─────────────────────────────────────────────
    server {
        listen 80;
        server_name farm.bicap.local;
        location / {
            proxy_pass http://web_farm;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Web Retailer ─────────────────────────────────────────
    server {
        listen 80;
        server_name retail.bicap.local;
        location / {
            proxy_pass http://web_retailer;
            proxy_set_header Host $host;
        }
    }

    # ── Web Shipping ─────────────────────────────────────────
    server {
        listen 80;
        server_name shipping.bicap.local;
        location / {
            proxy_pass http://web_shipping;
            proxy_set_header Host $host;
        }
    }

    # ── Web Public (default) ─────────────────────────────────
    server {
        listen 80;
        server_name bicap.local _;
        location / {
            proxy_pass http://web_public;
            proxy_set_header Host $host;
        }
    }
}