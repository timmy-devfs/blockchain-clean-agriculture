          in: header
          required: false
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "404":
          description: Notification kh??ng t???n t???i
        "401":
          description: Thi???u ?????nh danh user
        "200":
          description: ????nh d???u th??nh c??ng
  /notifications/read-all:
    put:
      tags:
        - Notifications
      summary: ????nh d???u t???t c??? th??ng b??o ???? ?????c
