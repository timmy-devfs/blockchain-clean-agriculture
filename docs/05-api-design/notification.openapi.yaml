components:
  schemas:
    TokenUpsertRequest:
      required:
        - platform
        - token
      type: object
      properties:
        token:
          type: string
          description: FCM registration token c???a thi???t b???
          example: fcm_token_xxx
        platform:
          pattern: ANDROID|IOS|WEB
          type: string
          description: N???n t???ng thi???t b???
          example: ANDROID
          enum:
            - ANDROID
            - IOS
            - WEB
    Pageable:
      type: object
      properties:
        page:
          minimum: 0
          type: integer
          format: int32
        size:
          minimum: 1
          type: integer
          format: int32
        sort:
          type: array
          items:
            type: string
    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: string
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        type:
          type: string
        createdAt:
          type: string
          format: date-time
    PageNotification:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        first:
          type: boolean
        last:
          type: boolean
        pageable:
          $ref: '#/components/schemas/PageableObject'
        numberOfElements:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        number:
          type: integer
          format: int32
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SortObject'
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        paged:
          type: boolean
        unpaged:
          type: boolean
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        offset:
          type: integer
          format: int64
        sort:
          type: array
          items:
            $ref: '#/components/schemas/SortObject'
    SortObject:
      type: object
      properties:
        direction:
          type: string
        nullHandling:
          type: string
        ascending:
          type: boolean
        property:
          type: string
        ignoreCase:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
