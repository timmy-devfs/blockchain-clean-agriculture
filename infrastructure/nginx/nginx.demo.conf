# ════════════════════════════════════════════════════════════════
# BICAP Nginx — Demo (tất cả containers, không SSL)
# ════════════════════════════════════════════════════════════════

events { worker_connections 1024; }

http {
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── API Gateway ──────────────────────────────────────────────
    upstream api_gateway  { server api-gateway:8080; }

    # ── Web Apps ─────────────────────────────────────────────────
    upstream web_admin    { server web-admin:3000;    }
    upstream web_farm     { server web-farm:3001;     }
    upstream web_retailer { server web-retailer:3002; }
    upstream web_shipping { server web-shipping:3003; }
    upstream web_public   { server web-public:3004;   }

    # ── Tất cả /api/** → API Gateway ────────────────────────────
    server {
        listen 80;
        server_name localhost _;

        # API routing
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        location /actuator/ {
            proxy_pass http://api_gateway;
        }

        location /api/gateway/ {
            proxy_pass http://api_gateway;
        }

        # Swagger docs
        location /docs/ {
            proxy_pass http://api_gateway;
        }

        # Health check Nginx
        location /nginx-health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # Default → web-public
        location / {
            proxy_pass http://web_public;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

    # ── Web Admin ─────────────────────────────────────────────
    server {
        listen 80;
        server_name admin.localhost;
        location / {
            proxy_pass         http://web_admin;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }

    # ── Web Farm ──────────────────────────────────────────────
    server {
        listen 80;
        server_name farm.localhost;
        location / {
            proxy_pass         http://web_farm;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }

    # ── Web Retailer ──────────────────────────────────────────
    server {
        listen 80;
        server_name retail.localhost;
        location / {
            proxy_pass http://web_retailer;
            proxy_set_header Host $host;
        }
    }

    # ── Web Shipping ──────────────────────────────────────────
    server {
        listen 80;
        server_name shipping.localhost;
        location / {
            proxy_pass http://web_shipping;
            proxy_set_header Host $host;
        }
    }
}