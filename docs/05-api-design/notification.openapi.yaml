  /tokens:
    post:
      tags:
        - Device Tokens
      summary: ????ng k?? ho???c c???p nh???t device token
      operationId: registerToken_1
      parameters:
        - name: X-User-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenUpsertRequest'
        required: true
      responses:
        "200":
          description: L??u token th??nh c??ng
        "400":
          description: Payload kh??ng h???p l???
