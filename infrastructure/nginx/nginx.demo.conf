# ════════════════════════════════════════════════════════════════
# BICAP Nginx — Demo (tất cả containers, không SSL)
# ════════════════════════════════════════════════════════════════

events { worker_connections 1024; }

http {
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── API Gateway ──────────────────────────────────────────────
    upstream api_gateway  { server api-gateway:8080; }
    # Direct service upstreams (bypass gateway for shipping flow)
    upstream identity_service { server identity-service:8081; }
    upstream shipping_service { server shipping-service:8084; }

    # ── Unified Web App ─────────────────────────────────────────
    upstream web_app { server web-app:3000; }

    # ── Tất cả /api/** → API Gateway ────────────────────────────
    server {
        listen 80;
        server_name localhost _;

        # Next.js local API (không qua gateway)
        location = /api/sync-orders {
            proxy_pass         http://web_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
        location = /api/geocode {
            proxy_pass         http://web_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
        location = /api/osrm {
            proxy_pass         http://web_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # API routing
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # Bắt buộc với một cấu hình Nginx: không forward Authorization → Gateway không có Bearer → 401/403.
            proxy_set_header   Authorization     $http_authorization;
            proxy_read_timeout 30s;
        }

        location /actuator/ {
            proxy_pass http://api_gateway;
        }

        location /api/gateway/ {
            proxy_pass http://api_gateway;
        }

        # Swagger docs
        location /docs/ {
            proxy_pass http://api_gateway;
        }

        # Health check Nginx
        location /nginx-health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # Default → /public within unified web-app
        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

    # ── Legacy subdomains mapped to route prefixes ────────────
    server {
        listen 80;
        server_name admin.localhost;
        location = / { return 302 /admin; }
        location / {
            proxy_pass         http://web_app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }

    # ── Web Farm ──────────────────────────────────────────────
    server {
        listen 80;
        server_name farm.localhost;
        location = / { return 302 /farm; }
        location / {
            proxy_pass         http://web_app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }
    }

    # ── Web Retailer ──────────────────────────────────────────
    server {
        listen 80;
        server_name retail.localhost;
        location = / { return 302 /retailer; }
        location / {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
        }
    }

    # ── Web Shipping ──────────────────────────────────────────
    server {
        listen 80;
        server_name shipping.localhost;
        location = / { return 302 /shipping; }
        location / {
            proxy_pass http://web_app;
            proxy_set_header Host $host;
        }
    }
}